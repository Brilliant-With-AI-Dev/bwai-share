<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto-publish smoke test</title>
    <style>
      :root {
        --bg: #ffffff;
        --ink: #1f2328;
        --muted: #59636e;
        --line: #d0d7de;
        --accent: #0969da;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        -webkit-text-size-adjust: 100%;
      }
      main {
        max-width: 640px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      .card {
        border: 1px solid var(--line);
        border-left: 4px solid var(--accent);
        border-radius: 8px;
        padding: 20px 22px;
        background: #fff;
      }
      .card h1 {
        margin: 0 0 8px;
        font-size: 20px;
        letter-spacing: -0.01em;
      }
      .card p {
        margin: 0;
        color: var(--muted);
      }
      .stamp {
        margin-top: 16px;
        font-size: 12px;
        color: var(--muted);
      }
      @media print {
        body {
          background: #fff;
        }
        .card {
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-label="Auto-publish smoke test report card">
        <h1>Auto-publish smoke test</h1>
        <p>
          Throwaway artifact verifying the /html-artifact skill publishes itself
          end to end with no human in the loop.
        </p>
        <p class="stamp">2026-06-09 — smoke test, safe to delete.</p>
      </section>
    </main>
  </body>
</html>
