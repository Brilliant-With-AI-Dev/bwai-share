<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>v8 Pipeline Tester — mockup</title>
    <style>
      :root {
        --bg: #ffffff;
        --canvas: #f6f8fa;
        --fg: #1f2328;
        --muted: #656d76;
        --border: #d0d7de;
        --border-strong: #afb8c1;
        --brand: #10623e;
        --brand-soft: #dff3e8;
        --brand-ink: #0a3f28;
        --a: #10623e;
        --a-soft: #dff3e8;
        --b: #8250df;
        --b-soft: #efe8fd;
        --ins: #1a7f37;
        --ins-soft: #d6f3df;
        --del: #cf222e;
        --del-soft: #ffe3e3;
        --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        --sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      body {
        font-family: var(--sans);
        color: var(--fg);
        background: var(--canvas);
        font-size: 15px;
        line-height: 1.55;
      }
      .bar {
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        padding: 11px 20px;
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .logo {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: var(--brand);
        position: relative;
      }
      .logo::after {
        content: "v8";
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
      }
      .bar h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 650;
      }
      .bar .sub {
        color: var(--muted);
        font-size: 12px;
      }
      .pill {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--canvas);
        color: var(--muted);
      }
      .spacer {
        flex: 1;
      }

      .shell {
        max-width: 880px;
        margin: 0 auto;
        padding: 22px 20px 90px;
      }
      .shell.wide {
        max-width: 1180px;
      }

      ol.steps {
        list-style: none;
        display: flex;
        gap: 0;
        padding: 0;
        margin: 4px 0 22px;
      }
      ol.steps li {
        flex: 1;
        text-align: center;
        font-size: 12.5px;
        color: var(--muted);
        position: relative;
        padding-top: 26px;
        font-weight: 600;
      }
      ol.steps li::before {
        content: "";
        position: absolute;
        top: 7px;
        left: 50%;
        width: 14px;
        height: 14px;
        margin-left: -7px;
        border-radius: 50%;
        background: var(--bg);
        border: 2px solid var(--border-strong);
        z-index: 2;
      }
      ol.steps li::after {
        content: "";
        position: absolute;
        top: 13px;
        left: -50%;
        width: 100%;
        height: 2px;
        background: var(--border);
        z-index: 1;
      }
      ol.steps li:first-child::after {
        display: none;
      }
      ol.steps li.done {
        color: var(--brand-ink);
      }
      ol.steps li.done::before {
        background: var(--brand);
        border-color: var(--brand);
      }
      ol.steps li.done::after {
        background: var(--brand);
      }
      ol.steps li.active {
        color: var(--brand-ink);
      }
      ol.steps li.active::before {
        border-color: var(--brand);
        box-shadow: 0 0 0 4px var(--brand-soft);
      }

      .card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
      }
      .eyebrow {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--brand);
        margin: 0 0 4px;
      }
      h2.title {
        font-size: 22px;
        margin: 0 0 6px;
        font-weight: 680;
      }
      p.help {
        color: var(--muted);
        margin: 0 0 18px;
        font-size: 14px;
      }

      label.lbl {
        display: block;
        font-size: 12px;
        font-weight: 650;
        color: var(--fg);
        margin: 16px 0 6px;
      }
      label.lbl .opt {
        color: var(--muted);
        font-weight: 500;
      }
      textarea,
      input.txt {
        width: 100%;
        font-family: var(--mono);
        font-size: 13px;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 10px 12px;
        background: var(--bg);
        resize: vertical;
      }
      textarea:focus,
      input.txt:focus {
        outline: 3px solid var(--brand-soft);
        border-color: var(--brand);
      }
      .samples {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
      .chip {
        font-size: 12.5px;
        border: 1px solid var(--border-strong);
        background: var(--bg);
        border-radius: 999px;
        padding: 5px 12px;
        cursor: pointer;
        color: var(--fg);
      }
      .chip:hover {
        border-color: var(--brand);
        color: var(--brand-ink);
      }

      .variant-pick {
        display: flex;
        gap: 10px;
        margin-top: 8px;
      }
      .vopt {
        flex: 1;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        cursor: pointer;
      }
      .vopt.on {
        border-color: var(--brand);
        background: var(--brand-soft);
      }
      .vopt h4 {
        margin: 0 0 2px;
        font-size: 14px;
      }
      .vopt p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 24px;
        flex-wrap: wrap;
      }
      .btn {
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 650;
        border: 1px solid var(--border-strong);
        background: var(--bg);
        color: var(--fg);
        padding: 10px 18px;
        border-radius: 9px;
        cursor: pointer;
      }
      .btn.primary {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
      }
      .btn.primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn.link {
        border: 0;
        background: none;
        color: var(--muted);
        padding: 10px 4px;
      }
      .btn.big {
        font-size: 15px;
        padding: 12px 22px;
      }
      .ghost-note {
        color: var(--muted);
        font-size: 12.5px;
      }

      .stagewrap {
        display: flex;
        gap: 18px;
      }
      .vcol {
        flex: 1;
        min-width: 0;
      }
      .vtag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 999px;
        margin-bottom: 8px;
      }
      .vtag.A {
        background: var(--a-soft);
        color: var(--a);
      }
      .vtag.B {
        background: var(--b-soft);
        color: var(--b);
      }
      .promptbox {
        font-family: var(--mono);
        font-size: 12.5px;
      }
      .out {
        font-family: var(--mono);
        font-size: 12.5px;
        background: var(--canvas);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 12px 14px;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 40px;
        margin-top: 10px;
      }
      .out:empty::before {
        content: "— output streams here when you send —";
        color: var(--muted);
      }
      .out .tag {
        color: var(--b);
      }
      .out .k {
        color: #0550ae;
      }
      .caret::after {
        content: "▋";
        color: var(--brand);
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      ins {
        background: var(--ins-soft);
        color: var(--ins);
        text-decoration: none;
      }
      del {
        background: var(--del-soft);
        color: var(--del);
      }
      .nodiff ins {
        background: transparent;
        color: inherit;
      }
      .nodiff del {
        display: none;
      }
      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 13px;
        color: var(--muted);
        cursor: pointer;
        user-select: none;
        margin-left: auto;
      }
      .toggle input {
        width: 15px;
        height: 15px;
        accent-color: var(--brand);
      }
      details.thread {
        margin-top: 16px;
        border: 1px dashed var(--border-strong);
        border-radius: 9px;
        background: #fcfcfd;
      }
      details.thread summary {
        cursor: pointer;
        padding: 9px 13px;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--muted);
      }
      details.thread .turn {
        font-family: var(--mono);
        font-size: 11.5px;
        padding: 7px 13px;
        border-top: 1px solid var(--border);
        white-space: pre-wrap;
      }
      .turn .role.system {
        color: var(--brand);
        font-weight: 700;
      }
      .turn .role.assistant {
        color: var(--b);
        font-weight: 700;
      }
      .note {
        background: #fff8e6;
        border: 1px solid #f0d68a;
        color: #6b5300;
        border-radius: 10px;
        padding: 9px 13px;
        font-size: 12.5px;
        margin-bottom: 16px;
      }
      @media (max-width: 760px) {
        .stagewrap {
          flex-direction: column;
        }
        .variant-pick {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="logo"></div>
      <div>
        <h1>v8 Pipeline Tester</h1>
        <div class="sub">
          internal · steps a transcript through the v8 letter pipeline
        </div>
      </div>
      <span class="pill">admin-only</span>
      <div class="spacer"></div>
      <span class="sub">mockup — synthetic data</span>
    </div>

    <div class="shell" id="shell"></div>

    <script>
      const state = { step: 0, variant: "A", diff: true };
      const VLABEL = { A: "Variant A", B: "Variant B", Both: "Both (compare)" };

      const PROMPT = {
        1: (v) => `You are the Mirror Letter reasoning engine (variant ${v}).
Read the FULL transcript in this thread. Return JSON ONLY:
{ "diagnostic_artifact": {…}, "narrative_artifact": { "section_blueprint": [9 sections] },
  "readiness_check": {…}, "source_bundle": { "subject_context": { "authority_level": "…" } } }
No prose. Do not write the letter.`,
        2: (v) => `You are the Mirror Letter writer (variant ${v}).
Use the reasoning JSON above + transcript. Write the letter, 9 sections, ~1700–2200 words.
Wrap exactly: <deliverable name="mirror-letter" version="8.0${v}"> … </deliverable>
[ OUTPUT_TEMPLATE_V8${v} + ROLE_EXAMPLES hydrated server-side ]`,
        3: () => `You are the Mirror action-plan author (shared A/B).
The letter + transcript are in this thread. Produce 5 sections.
Wrap exactly: <deliverable name="action-plan" version="8.0"> … </deliverable>`,
      };
      const OUTPUT = {
        1: (v) => `<span class="k">{</span>
  "diagnostic_artifact": { "core_tension": "speed vs. shared context" },
  "narrative_artifact": { "section_blueprint": ["§1 Opening","§2 Pattern","…","§9 Forward"] },
  "readiness_check": { "ready": true },
  "source_bundle": { "subject_context": { "authority_level": "executive" } }
<span class="k">}</span>`,
        2: (v) =>
          v === "A"
            ? `<span class="tag">&lt;deliverable name="mirror-letter" version="8.0A"&gt;</span>
<b>The Decision You Owned</b>
Jordan — the redesign shipped early <ins>and you named it your call without flinching</ins>.
… 9 sections …
<span class="tag">&lt;/deliverable&gt;</span>`
            : `<span class="tag">&lt;deliverable name="mirror-letter" version="8.0B"&gt;</span>
<b>Where You Moved First</b>
Jordan — the redesign shipped early<del>, and you named it your call without flinching</del><ins>, a call you still defend</ins>.
… 9 sections …
<span class="tag">&lt;/deliverable&gt;</span>`,
        3: () => `<span class="tag">&lt;deliverable name="action-plan" version="8.0"&gt;</span>
<b>1. The one shift</b>  Publish the "why" before the "what."
<b>2. This week</b> …  <b>3. This quarter</b> …  <b>4. Watch-fors</b> …  <b>5. Success signals</b> …
<span class="tag">&lt;/deliverable&gt;</span>`,
      };
      const STAGE_META = {
        1: {
          eyebrow: "Stage 1 of 3",
          title: "Reasoning · Prompt 6.1",
          help: "The model reads your transcript and produces the structured reasoning (JSON) the letter is built from — not prose yet. Review or edit the system prompt, then send.",
        },
        2: {
          eyebrow: "Stage 2 of 3",
          title: "Letter Writer · Prompt 6.2",
          help: "Using the reasoning from step 1 (already in the conversation), the model writes the Mirror Letter. Edit the prompt if you want, then send.",
        },
        3: {
          eyebrow: "Stage 3 of 3",
          title: "Action Plan · Prompt 7",
          help: "The model turns the letter into a 5-part action plan. The letter is already in the conversation, so it isn't repeated here.",
        },
      };

      const shell = document.getElementById("shell");
      const esc = (s) =>
        s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      function stepper() {
        const names = [
          "Setup",
          "Reasoning · 6.1",
          "Letter · 6.2",
          "Action Plan · 7",
        ];
        return `<ol class="steps">${names
          .map((n, i) => {
            const cls =
              i < state.step ? "done" : i === state.step ? "active" : "";
            return `<li class="${cls}">${n}</li>`;
          })
          .join("")}</ol>`;
      }

      function variantCols(stageN) {
        const cols = state.variant === "Both" ? ["A", "B"] : [state.variant];
        const diffClass = state.diff ? "" : "nodiff";
        const body = cols
          .map(
            (v) => `
          <div class="vcol">
            ${state.variant === "Both" ? `<span class="vtag ${v}">Variant ${v}</span>` : ""}
            <label class="lbl">System message — sent verbatim (editable)</label>
            <textarea class="promptbox" rows="${stageN === 1 ? 6 : 4}">${esc(PROMPT[stageN](v))}</textarea>
            <label class="lbl">Output</label>
            <div class="out ${diffClass}" data-out data-v="${v}"></div>
          </div>`,
          )
          .join("");
        return `<div class="stagewrap">${body}</div>`;
      }

      function render() {
        shell.classList.toggle(
          "wide",
          state.step >= 1 && state.step <= 3 && state.variant === "Both",
        );
        if (state.step === 0) return renderSetup();
        if (state.step === 4) return finishView();
        renderStage(state.step);
      }

      function renderSetup() {
        shell.innerHTML =
          stepper() +
          `
        <div class="card">
          <p class="eyebrow">Start here</p>
          <h2 class="title">Set up a run</h2>
          <p class="help">Paste a Mirror interview transcript, choose which prompt variant to run, then start. You'll step through three stages — Reasoning → Letter → Action Plan — and can edit each prompt before it's sent.</p>

          <label class="lbl">1 · Transcript <span class="opt">(required)</span></label>
          <textarea id="transcript" rows="4">[interviewer] Tell me about a decision you got wrong this year.
[Jordan Avery] We shipped the workspace redesign before the data model was ready. I owned the call…</textarea>
          <div class="samples">
            <span class="ghost-note" style="align-self:center">or load a sample:</span>
            <button class="chip" onclick="loadSample('Jordan Avery · VP Product')">Jordan Avery · VP Product</button>
            <button class="chip" onclick="loadSample('Sam Rivera · Eng Manager')">Sam Rivera · Eng Manager</button>
            <button class="chip" onclick="loadSample('Casey Lin · Designer')">Casey Lin · Designer</button>
          </div>

          <label class="lbl">2 · Which prompt variant? <span class="opt">— A and B are two competing prompt designs</span></label>
          <div class="variant-pick" id="vpick">
            <div class="vopt" data-v="A"><h4>A only</h4><p>Run the A prompts</p></div>
            <div class="vopt" data-v="B"><h4>B only</h4><p>Run the B prompts</p></div>
            <div class="vopt" data-v="Both"><h4>Both</h4><p>Side-by-side, compare A vs B</p></div>
          </div>

          <details style="margin-top:16px"><summary class="ghost-note" style="cursor:pointer">Optional inputs (intake form, extra context)</summary>
            <label class="lbl">Intake form <span class="opt">(optional)</span></label>
            <textarea rows="2">role: VP Product · company: 220-person SaaS · tenure: 3y</textarea>
            <label class="lbl">Supplied context <span class="opt">(optional)</span></label>
            <textarea rows="2">prior 360 noted "moves fast, communicates late"</textarea>
          </details>

          <div class="actions">
            <button class="btn primary big" onclick="start()">Start → Stage 1: Reasoning</button>
            <span class="ghost-note" id="vhint">running: Variant A</span>
          </div>
        </div>`;
        const vpick = document.getElementById("vpick");
        const paint = () =>
          [...vpick.children].forEach((c) =>
            c.classList.toggle("on", c.dataset.v === state.variant),
          );
        paint();
        vpick.addEventListener("click", (e) => {
          const o = e.target.closest(".vopt");
          if (!o) return;
          state.variant = o.dataset.v;
          paint();
          document.getElementById("vhint").textContent =
            "running: " + VLABEL[state.variant];
        });
      }

      function renderStage(n) {
        const m = STAGE_META[n];
        const showDiff = n === 2 && state.variant === "Both";
        shell.innerHTML =
          stepper() +
          `
        <div class="card">
          <div style="display:flex;align-items:center">
            <div><p class="eyebrow">${m.eyebrow}</p><h2 class="title">${m.title}</h2></div>
            ${showDiff ? `<label class="toggle"><input type="checkbox" id="diff" ${state.diff ? "checked" : ""}/> highlight A vs B differences</label>` : ""}
          </div>
          <p class="help">${m.help}</p>
          <div class="note">Editing the box below changes exactly what's sent to the model. Nothing is hidden — what you see is what's transmitted.</div>
          ${variantCols(n)}
          <div class="actions">
            <button class="btn link" onclick="goto(${n - 1})">← Back</button>
            <button class="btn primary big" id="sendBtn" onclick="send(${n})">${state.variant === "Both" ? "Send both ▷" : "Send ▷"}</button>
            <button class="btn big" id="nextBtn" style="display:none" onclick="goto(${n + 1})">${n < 3 ? "Continue →" : "Finish ✓"}</button>
            <span class="ghost-note">${VLABEL[state.variant]} · one platform thread per variant</span>
          </div>
          <details class="thread"><summary>▸ Full conversation thread (what the model actually saw)</summary>
            <div class="turn"><span class="role system">system</span>  6.1 reasoning prompt …</div>
            <div class="turn"><span class="role assistant">assistant</span>  { diagnostic_artifact … }</div>
            <div class="turn"><span class="role system">system</span>  6.2 letter prompt …</div>
            <div class="turn"><span class="role assistant">assistant</span>  &lt;deliverable name="mirror-letter" …&gt;</div>
          </details>
        </div>`;
        const d = document.getElementById("diff");
        if (d)
          d.addEventListener("change", (e) => {
            state.diff = e.target.checked;
            document
              .querySelectorAll(".out")
              .forEach((o) => o.classList.toggle("nodiff", !state.diff));
          });
      }

      function typeInto(el, html) {
        el.classList.add("caret");
        el.innerHTML = "";
        const toks = html.split(/(\s+)/);
        let i = 0;
        const t = setInterval(() => {
          el.innerHTML += toks[i++];
          if (i >= toks.length) {
            clearInterval(t);
            el.classList.remove("caret");
          }
        }, 12);
      }
      function send(n) {
        document
          .querySelectorAll("[data-out]")
          .forEach((el) => typeInto(el, OUTPUT[n](el.dataset.v)));
        document.getElementById("sendBtn").textContent = "Re-run ↻";
        document.getElementById("nextBtn").style.display = "";
      }
      function goto(n) {
        state.step = Math.max(0, Math.min(4, n));
        render();
      }
      function start() {
        state.step = 1;
        render();
      }
      function loadSample(name) {
        document.getElementById("transcript").value =
          "[interviewer] Walk me through a moment you led under pressure.\n[" +
          name.split(" · ")[0] +
          "] …(synthetic sample loaded)…";
      }
      function finishView() {
        shell.innerHTML =
          stepper() +
          `<div class="card">
          <p class="eyebrow">Done</p><h2 class="title">Run complete</h2>
          <p class="help">All three stages ran for ${VLABEL[state.variant]}. Open any thread to audit what the model saw, or start over with a new transcript.</p>
          <div class="actions"><button class="btn primary big" onclick="goto(0)">Start a new run</button><button class="btn" onclick="goto(3)">← Back to Action Plan</button></div>
        </div>`;
      }

      render();
    </script>
  </body>
</html>
